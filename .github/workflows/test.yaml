---
name: Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

# GOEXPERIMENT cocktail mandated by .envrc and plan line 904.
# When the snapshot stdlib bug is fixed upstream, the amd64-with-simd
# job can flip continue-on-error to false.
env:
  GOEXPERIMENT_SIMD: "loopvar,newinliner,jsonv2,greenteagc,simd,randomizedheapbase64,sizespecializedmalloc,runtimesecret,mapsplitgroup"
  CODEX_CLI_VERSION: "0.142.0-alpha.7"

jobs:
  test:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write

    steps:
      # https://github.com/actions/checkout
      - uses: actions/checkout@v6

      # actions/setup-go does not resolve the module's go 1.27
      # directive yet; use stable Go only to install the gotip wrapper.
      - name: Setup gotip dev.simd
        uses: ./.github/actions/setup-gotip

      - name: Setup Node.js for pinned Codex CLI
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install pinned Codex CLI
        run: |
          npm install --global "@openai/codex@${CODEX_CLI_VERSION}"
          command -v codex
          test "$(codex --version)" = "codex-cli ${CODEX_CLI_VERSION}"

      - name: Run Unit tests
        env:
          GOEXPERIMENT: ${{ env.GOEXPERIMENT_SIMD }}
        run: |
          gotip test -race -count=1 -shuffle=on -cover -covermode=atomic -coverpkg=./... -coverprofile=coverage.out -tags='osusergo,netgo,static' -ldflags='-s -w -buildid=' ./...

      # https://github.com/codecov/codecov-action
      - name: Upload Coverage report to CodeCov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          use_oidc: true
          verbose: true

  vet:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      # https://github.com/actions/checkout
      - uses: actions/checkout@v6

      # actions/setup-go does not resolve the module's go 1.27
      # directive yet; use stable Go only to install the gotip wrapper.
      - name: Setup gotip dev.simd
        uses: ./.github/actions/setup-gotip

      - name: Run go vet
        env:
          GOEXPERIMENT: ${{ env.GOEXPERIMENT_SIMD }}
        run: |-
          gotip vet ./...
