name: Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

jobs:
  test:
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      id-token: write

    steps:
      # https://github.com/actions/checkout
      - uses: actions/checkout@v6

      # actions/setup-go does not resolve the module's go 1.27
      # directive yet; use stable Go only to install the gotip wrapper.
      # https://github.com/actions/setup-go
      - name: Bootstrap Go for gotip
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
          check-latest: true
          cache-dependency-path: |
            go.sum

      - name: Install gotip dev.simd
        run: |
          go install golang.org/dl/gotip@latest
          gotip download dev.simd
          gotip version

      - name: Run Unit tests
        run: |
          gotip test -race -count=1 -shuffle=on -cover -covermode=atomic -coverpkg=./... -coverprofile=coverage.out -tags='osusergo,netgo,static' -ldflags='-s -w' ./...

      # https://github.com/codecov/codecov-action
      - name: Upload Coverage report to CodeCov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          use_oidc: true
          verbose: true

  vet:
    runs-on: ubuntu-24.04

    permissions:
      contents: read

    steps:
      # https://github.com/actions/checkout
      - uses: actions/checkout@v6

      # actions/setup-go does not resolve the module's go 1.27
      # directive yet; use stable Go only to install the gotip wrapper.
      # https://github.com/actions/setup-go
      - name: Bootstrap Go for gotip
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
          check-latest: true
          cache-dependency-path: |
            go.sum

      - name: Install gotip dev.simd
        run: |
          go install golang.org/dl/gotip@latest
          gotip download dev.simd
          gotip version

      - name: Run go vet
        run: |
          gotip vet ./...
