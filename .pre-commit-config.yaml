repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        language_version: system

  - repo: https://github.com/zchee/pre-commit-go
    rev: 60c32a1154f8158bfa7652aa1540e844d1c44ac6
    hooks:
      - id: gofumpt
      - id: goimports-rereviser

exclude: '.*/testdata/'
